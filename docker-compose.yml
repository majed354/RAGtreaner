services:
  bot:
    build: .
    container_name: ${instance_label:-legal-consultation-bot}
    restart: unless-stopped
    ports:
      - "${server_port:-8000}:${server_port:-8000}"
    volumes:
      - ./data:/app/data
      - ./documents:/app/documents
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Riyadh
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port ${server_port:-8000}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${server_port:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
